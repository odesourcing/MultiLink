<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#F2EBDD" />
<title>Ode Sourcing — Links</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400;1,9..40,500&display=swap" rel="stylesheet">

<style>
  /* -----------------------------------------------------------
     RESET
  ----------------------------------------------------------- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  a { text-decoration: none; color: inherit; }
  button { font: inherit; background: none; border: 0; cursor: pointer; color: inherit; }
  img { display: block; max-width: 100%; }

  /* -----------------------------------------------------------
     DESIGN TOKENS
  ----------------------------------------------------------- */
  :root {
    --bg:        #F2EBDD;          /* cream / ivory */
    --bg-2:      #EADFCB;          /* warmer cream for gradients */
    --ink:       #1F1A14;          /* almost-black brown */
    --ink-soft:  #4A3F33;          /* secondary text */
    --accent:    #9D5434;          /* terracotta hover */
    --accent-2:  #C68F5E;          /* lighter copper */
    --line:      rgba(31, 26, 20, 0.14);
    --card:      rgba(255, 251, 244, 0.55);
    --card-hover:#1F1A14;
    --shadow:    0 1px 0 rgba(31,26,20,.06), 0 12px 30px -18px rgba(31,26,20,.25);

    --radius-btn: 999px;
    --radius-card: 22px;

    --font-serif: "DM Sans", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    --font-sans:  "DM Sans", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }

  /* -----------------------------------------------------------
     BACKGROUND
  ----------------------------------------------------------- */
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--bg);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    position: relative;
  }
  /* ----- Background video ----- */
  .bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
  }
  /* Subtle grain overlay for depth */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: .22;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    z-index: 1;
  }

  /* -----------------------------------------------------------
     LAYOUT
  ----------------------------------------------------------- */
  .page {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
    padding: 56px 24px 40px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* -----------------------------------------------------------
     HEADER
  ----------------------------------------------------------- */
  .avatar {
    width: 116px; height: 116px;
    border-radius: 50%;
    background: var(--bg-2);
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(31,26,20,.08),
      0 0 0 6px var(--bg),
      0 0 0 7px rgba(31,26,20,.10),
      0 18px 40px -22px rgba(31,26,20,.45);
    animation: rise .8s cubic-bezier(.2,.7,.2,1) both;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .brand {
    margin-top: 22px;
    font-family: var(--font-sans);
    font-style: normal;
    font-weight: 500;
    font-size: 30px;
    letter-spacing: -0.02em;
    line-height: 1.05;
    text-align: center;
    color: var(--bg);
    animation: rise .8s .08s cubic-bezier(.2,.7,.2,1) both;
  }

  .tagline {
    margin-top: 10px;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: center;
    animation: rise .8s .14s cubic-bezier(.2,.7,.2,1) both;
  }

  /* Decorative divider with tiny diamond */
  .divider {
    margin-top: 22px;
    width: 80px;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: .6;
    animation: rise .8s .2s cubic-bezier(.2,.7,.2,1) both;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--accent);
  }
  .divider svg { width: 8px; height: 8px; color: var(--accent); }

  /* -----------------------------------------------------------
     CONTACT ICONS (phone + email)
  ----------------------------------------------------------- */
  .contact-row {
    margin-top: 18px;
    display: flex;
    gap: 14px;
    animation: rise .8s .25s cubic-bezier(.2,.7,.2,1) both;
  }
  .contact-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--ink);
    border: 1px solid var(--line);
    background: var(--card);
    backdrop-filter: blur(6px);
    transition: transform .25s ease, background .25s ease, color .25s ease, border-color .25s ease;
  }
  .contact-btn:hover, .contact-btn:focus-visible {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    transform: translateY(-2px);
    outline: none;
  }
  .contact-btn svg { width: 18px; height: 18px; }

  /* -----------------------------------------------------------
     LINK BUTTONS
  ----------------------------------------------------------- */
  .links {
    margin-top: 36px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .link-btn {
    --i: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    min-height: 60px;
    padding: 16px 22px;
    border-radius: var(--radius-btn);
    background: var(--card);
    backdrop-filter: blur(6px);
    border: 1px solid var(--line);
    color: var(--ink);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: .02em;
    box-shadow: var(--shadow);
    transition: transform .3s cubic-bezier(.2,.7,.2,1),
                background .3s ease,
                color .3s ease,
                border-color .3s ease;
    overflow: hidden;
    animation: rise .7s cubic-bezier(.2,.7,.2,1) both;
    animation-delay: calc(.32s + var(--i) * .07s);
  }
  .link-btn .label { position: relative; z-index: 1; }
  .link-btn .arrow {
    position: absolute;
    right: 22px;
    z-index: 1;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity .3s ease, transform .3s ease;
  }
  .link-btn .arrow svg { width: 16px; height: 16px; }

  .link-btn:hover, .link-btn:focus-visible {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    transform: translateY(-2px);
    outline: none;
  }
  .link-btn:hover .arrow,
  .link-btn:focus-visible .arrow {
    opacity: 1;
    transform: translateX(0);
  }
  .link-btn:active { transform: translateY(0); }

  /* Featured / primary button variant */
  .link-btn.featured {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .link-btn.featured:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* -----------------------------------------------------------
     FOOTER
  ----------------------------------------------------------- */
  .footer {
    margin-top: auto;
    padding-top: 48px;
    text-align: center;
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--bg);
    opacity: .7;
  }
  .footer span { color: var(--accent); }

  /* -----------------------------------------------------------
     ANIMATIONS
  ----------------------------------------------------------- */
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Reduce motion preference */
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  /* Tighten on smaller phones */
  @media (max-width: 360px) {
    .page { padding: 40px 18px 32px; }
    .brand { font-size: 26px; }
    .avatar { width: 100px; height: 100px; }
  }

  /* -----------------------------------------------------------
     DESKTOP: mobile-only column, surrounded by olive #6E6B4C
  ----------------------------------------------------------- */
  @media (min-width: 481px) {
    body {
      background: #6E6B4C;
    }
    .bg-video,
    body::before {
      left: 50%;
      right: auto;
      width: 440px;
      max-width: 100vw;
      transform: translateX(-50%);
    }
    .page {
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.08),
        0 30px 80px -20px rgba(0,0,0,0.45);
    }
  }
</style>
</head>
<body>

  <!-- ============ BACKGROUND VIDEO ============ -->
  <video
    class="bg-video"
    autoplay
    loop
    muted
    playsinline
    preload="auto"
    aria-hidden="true"
  >
    <source src="ode-bg.mp4" type="video/mp4" />
  </video>

  <main class="page">

    <!-- ============ AVATAR ============ -->
    <div class="avatar">
      <!-- Replace src with your logo / profile image -->
      <img
        src="ode-logo.png"
        alt="Ode Sourcing logo"
      />
    </div>

    <!-- ============ BRAND NAME ============ -->
    <h1 class="brand">Ode Sourcing</h1>

    <!-- ============ DIVIDER ============ -->
    <div class="divider" aria-hidden="true">
      <svg viewBox="0 0 8 8"><path d="M4 0 L8 4 L4 8 L0 4 Z" fill="currentColor"/></svg>
    </div>

    <!-- ============ CONTACT ICONS ============ -->
    <div class="contact-row" role="group" aria-label="Contact">
      <a href="tel:+33749250570" class="contact-btn" aria-label="Téléphone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/>
        </svg>
      </a>
      <a href="mailto:contact@odesourcing.com" class="contact-btn" aria-label="Email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2.5" y="4.5" width="19" height="15" rx="2"/>
          <path d="m3 6 9 7 9-7"/>
        </svg>
      </a>
    </div>

    <!-- ============ LINKS ============ -->
    <nav class="links" aria-label="Liens">

      <a href="https://odeatlas.wixsite.com/ode-atlas" class="link-btn" style="--i:0">
        <span class="label">Mon site web</span>
        <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>
      </a>

      <a href="https://www.instagram.com/odesourcing/?hl=fr" class="link-btn" style="--i:1">
        <span class="label">Instagram</span>
        <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>
      </a>

      <a href="https://www.linkedin.com/company/ode-sourcing/" class="link-btn" style="--i:2">
        <span class="label">LinkedIn</span>
        <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>
      </a>

    </nav>

    <!-- ============ FOOTER ============ -->
    <footer class="footer">
      © 2026 Ode Sourcing
    </footer>

  </main>

</body>
</html>
